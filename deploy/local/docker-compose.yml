# docker run -d --rm --name mongo -p 27017:27017 -v E:\volumenes-docker\mongodbdata:/data/db mongo
version: "3.8"

services:
  postgres-db:
    image: postgres:15.3
    # restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgressdbdata:/var/lib/postgresql/data
    ports:
      ##PURTO LOCAL - PUERTO INTERNO
      ## PARA MEJOR guardado basico ulid
      - 5432:5432

  davi-engine-co2:
    build:
      context: ../../davi-engine-co2
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-dev}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${ENGINE_CORS_ORIGINS:-http://localhost:5000}
    ports:
      - "3000:3000"
    depends_on:
      - postgres-db

  davi-bff:
    build:
      context: ../../
      dockerfile: davi-bff/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Postgres: ${BFF_POSTGRES_URL}
      Engine__BaseUrl: ${ENGINE_BASE_URL:-http://davi-engine-co2:3000}
      Engine__TimeoutSeconds: 30
    ports:
      - "5000:5000"
    depends_on:
      - postgres-db
      - davi-engine-co2

volumes:
  postgressdbdata:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${POSTGRES_DATA_PATH}
